# .STATUS Conflict-Marker Guard
#
# .STATUS is hand-edited frequently, often across concurrent worktrees/PRs.
# This fails CI if a literal git merge-conflict marker (<<<<<<<, =======,
# >>>>>>>) was committed by mistake.

name: Status Guard

on:
  push:
    paths:
      - '.STATUS'
  # No path filter on pull_request: this job is a required status check, and a
  # path-filtered required check never reports on PRs outside its paths —
  # permanently blocking them (e.g. every bot formula PR). The check is a grep;
  # run it on every PR so branch protection can always resolve.
  pull_request:

jobs:
  conflict-markers:
    name: Check .STATUS for conflict markers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check .STATUS for conflict markers
        run: bash generator/check-status-conflict-markers.sh .STATUS

# Formula Drift Guard
#
# Generated formulas (Formula/*.rb) must always match a fresh regen from
# generator/manifest.json. This fails CI if a generated formula was hand-edited
# without updating the source — preventing silent manifest-drift that the next
# release regen would revert.

name: Formula Drift Guard

on:
  push:
    paths:
      - 'generator/**'
      - 'Formula/**'
      - '.github/workflows/formula-drift.yml'
  pull_request:
    paths:
      - 'generator/**'
      - 'Formula/**'

jobs:
  drift:
    name: Regen vs committed
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 (full history) — the upcoming revision-drift check needs to
      # diff Formula/*.rb against the PR base ref / previous push commit, which the
      # default shallow (depth-1) checkout doesn't have available.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check formula drift (regen vs committed)
        run: bash generator/check-drift.sh

      - name: No-symlink install contract (claude-plugin formulas)
        run: bash tests/test_no_symlink_install.sh

      # Base ref differs by trigger: pull_request compares against the PR's base
      # commit; push compares against the previous tip (github.event.before). A
      # push event for a brand-new branch has `before` as the all-zeros sentinel —
      # skip gracefully rather than error, since there's no real "before" state.
      - name: Determine revision-drift check inputs
        id: drift_inputs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha=$(jq -r '.pull_request.base.sha' "$GITHUB_EVENT_PATH")
            labels=$(jq -r '[(.pull_request.labels // [])[].name] | join(",")' "$GITHUB_EVENT_PATH")
          else
            base_sha="${{ github.event.before }}"
            labels=""
          fi
          if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
            echo "labels=$labels" >> "$GITHUB_OUTPUT"
          fi

      - name: Revision-drift check (formula content changed without version/revision bump)
        if: steps.drift_inputs.outputs.skip == 'false'
        env:
          PR_LABELS: ${{ steps.drift_inputs.outputs.labels }}
        run: bash generator/check-revision-bump.sh "${{ steps.drift_inputs.outputs.base_sha }}"

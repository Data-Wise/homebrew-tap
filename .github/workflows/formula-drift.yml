# Formula Drift Guard
#
# Generated formulas (Formula/*.rb) must always match a fresh regen from
# generator/manifest.json. This fails CI if a generated formula was hand-edited
# without updating the source — preventing silent manifest-drift that the next
# release regen would revert.

name: Formula Drift Guard

on:
  push:
    paths:
      - 'generator/**'
      - 'Formula/**'
      - '.github/workflows/formula-drift.yml'
  pull_request:
    paths:
      - 'generator/**'
      - 'Formula/**'

jobs:
  drift:
    name: Regen vs committed
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 (full history) — the upcoming revision-drift check needs to
      # diff Formula/*.rb against the PR base ref / previous push commit, which the
      # default shallow (depth-1) checkout doesn't have available.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check formula drift (regen vs committed)
        run: bash generator/check-drift.sh

      - name: No-symlink install contract (claude-plugin formulas)
        run: bash tests/test_no_symlink_install.sh
